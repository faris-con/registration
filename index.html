<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Competition Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 2px solid #667eea;
            transition: transform 0.3s ease;
        }

        .form-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .section-title {
            color: #667eea;
            font-size: 1.4em;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1em;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: white;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(-1px);
        }

        .required {
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            .member-grid {
                grid-template-columns: 1fr;
            }
        }

        .success-message {
            display: none;
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Programming Competition</h1>
            <p>Register your team now and be part of the challenge</p>
        </div>

        <form action="https://formspree.io/f/mblpdykg" method="POST" id="registrationForm">
            <!-- Team Information -->
            <div class="form-section">
                <div class="section-title">📋 Team Information</div>
                <div class="form-group">
                    <label>Team Name <span class="required">*</span></label>
                    <input type="text" name="team_name" required placeholder="Enter team name">
                </div>
                <div class="form-group">
                    <label>Team Leader Name <span class="required">*</span></label>
                    <input type="text" name="team_leader" required placeholder="Enter team leader name">
                </div>
            </div>

            <!-- Member 1 -->
            <div class="form-section">
                <div class="section-title">👤 Member 1</div>
                <div class="member-grid">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" name="member1_name" required placeholder="Full name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" name="member1_phone" required placeholder="01xxxxxxxxx" pattern="[0-9]{11}" title="Phone number must be exactly 11 digits">
                    </div>
                    <div class="form-group">
                        <label>ID <span class="required">*</span></label>
                        <input type="text" name="member1_id" required placeholder="National ID or Student ID">
                    </div>
                </div>
            </div>

            <!-- Member 2 -->
            <div class="form-section">
                <div class="section-title">👤 Member 2</div>
                <div class="member-grid">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" name="member2_name" required placeholder="Full name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" name="member2_phone" required placeholder="01xxxxxxxxx" pattern="[0-9]{11}" title="Phone number must be exactly 11 digits">
                    </div>
                    <div class="form-group">
                        <label>ID <span class="required">*</span></label>
                        <input type="text" name="member2_id" required placeholder="National ID or Student ID">
                    </div>
                </div>
            </div>

            <!-- Member 3 -->
            <div class="form-section">
                <div class="section-title">👤 Member 3</div>
                <div class="member-grid">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" name="member3_name" required placeholder="Full name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" name="member3_phone" required placeholder="01xxxxxxxxx" pattern="[0-9]{11}" title="Phone number must be exactly 11 digits">
                    </div>
                    <div class="form-group">
                        <label>ID <span class="required">*</span></label>
                        <input type="text" name="member3_id" required placeholder="National ID or Student ID">
                    </div>
                </div>
            </div>

            <button type="submit">Register Team Now 🚀</button>
        </form>

        <div class="success-message" id="successMessage">
            ✅ Registration Successful! Thank you for participating
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate phone numbers
            const phones = [
                document.querySelector('input[name="member1_phone"]').value,
                document.querySelector('input[name="member2_phone"]').value,
                document.querySelector('input[name="member3_phone"]').value
            ];
            
            for(let phone of phones) {
                if(phone.length !== 11 || !/^\d+$/.test(phone)) {
                    alert('All phone numbers must be exactly 11 digits!');
                    return;
                }
            }
            
            // Submit form via AJAX
            const formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if(response.ok) {
                    const successMessage = document.getElementById('successMessage');
                    successMessage.style.display = 'block';
                    this.reset();
                    
                    setTimeout(function() {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    alert('Something went wrong. Please try again.');
                }
            }).catch(error => {
                alert('Error: ' + error.message);
            });
        });
    </script>
</body>
</html>
